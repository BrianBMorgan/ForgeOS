<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Fact Checker</title>
  <link rel="stylesheet" href="/style.css" />
<script>(function(){
  var active=false,overlay=null,lastEl=null;
  function sel(el){var parts=[];var e=el;for(var i=0;i<4&&e&&e!==document.body;i++){var s=e.tagName.toLowerCase();if(e.id)s+='#'+e.id;else if(e.className&&typeof e.className==='string')s+='.'+e.className.trim().split(/\s+/).slice(0,2).join('.');parts.unshift(s);e=e.parentElement;}return parts.join(' > ');}
  function trim(s,n){return s&&s.length>n?s.slice(0,n)+'...':s||'';}
  function show(el){if(!overlay){overlay=document.createElement('div');overlay.style.cssText='position:fixed;pointer-events:none;outline:2px solid #6366f1;outline-offset:1px;background:rgba(99,102,241,0.1);z-index:2147483647;transition:all 0.05s';document.body.appendChild(overlay);}var r=el.getBoundingClientRect();overlay.style.top=r.top+'px';overlay.style.left=r.left+'px';overlay.style.width=r.width+'px';overlay.style.height=r.height+'px';overlay.style.display='block';}
  function hide(){if(overlay)overlay.style.display='none';}
  document.addEventListener('mousemove',function(e){if(!active)return;var el=document.elementFromPoint(e.clientX,e.clientY);if(el&&el!==overlay){lastEl=el;show(el);}},true);
  document.addEventListener('click',function(e){if(!active)return;e.preventDefault();e.stopPropagation();var el=lastEl||e.target;window.parent.postMessage({type:'forge:inspect:selection',outerHTML:trim(el.outerHTML,600),textContent:trim((el.textContent||'').trim(),200),selector:sel(el)},'*');},true);
  window.addEventListener('message',function(e){if(!e.data)return;if(e.data.type==='forge:inspect:activate'){active=true;document.body.style.cursor='crosshair';}if(e.data.type==='forge:inspect:deactivate'){active=false;hide();document.body.style.cursor='';}});
})();</script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">&#10003;</span>
        <span class="logo-text">FactCheck <span class="logo-ai">AI</span></span>
      </div>
      <p class="tagline">Instant AI-powered fact verification</p>
    </header>

    <main class="main">
      <section class="input-section">
        <form id="factForm">
          <div class="textarea-wrapper">
            <textarea
              id="claimInput"
              placeholder="Enter a claim or question to fact-check..."
              maxlength="1000"
              rows="4"
              aria-label="Claim to fact-check"
            ></textarea>
            <span class="char-count"><span id="charCount">0</span>/1000</span>
          </div>
          <button type="submit" id="submitBtn" class="submit-btn">
            <span class="btn-text">Check Fact</span>
            <span class="btn-spinner" hidden>&#9696;</span>
          </button>
        </form>

        <div class="examples">
          <span class="examples-label">Try an example:</span>
          <div class="chips">
            <button class="chip" data-claim="The Great Wall of China is visible from space with the naked eye.">Great Wall from space</button>
            <button class="chip" data-claim="Humans only use 10% of their brains.">10% brain myth</button>
            <button class="chip" data-claim="Lightning never strikes the same place twice.">Lightning strikes</button>
            <button class="chip" data-claim="Eating carrots improves your eyesight.">Carrots and eyesight</button>
            <button class="chip" data-claim="The Earth is approximately 4.5 billion years old.">Earth's age</button>
          </div>
        </div>
      </section>

      <section class="result-section" id="resultSection" hidden>
        <div class="result-card" id="resultCard">
          <div class="result-header">
            <div class="verdict-badge" id="verdictBadge">
              <span class="verdict-icon" id="verdictIcon"></span>
              <span class="verdict-label" id="verdictLabel"></span>
            </div>
            <div class="confidence-block">
              <span class="confidence-label">Confidence</span>
              <div class="confidence-bar-track">
                <div class="confidence-bar-fill" id="confidenceFill"></div>
              </div>
              <span class="confidence-pct" id="confidencePct"></span>
            </div>
          </div>

          <p class="result-summary" id="resultSummary"></p>

          <div class="result-explanation" id="resultExplanation"></div>

          <div class="result-meta">
            <div class="sources-block" id="sourcesBlock">
              <h3 class="meta-heading">Sources</h3>
              <ul class="sources-list" id="sourcesList"></ul>
            </div>
            <div class="tags-block" id="tagsBlock">
              <h3 class="meta-heading">Topics</h3>
              <div class="tags-list" id="tagsList"></div>
            </div>
          </div>
        </div>
      </section>

      <div class="error-banner" id="errorBanner" hidden>
        <span class="error-icon">&#9888;</span>
        <span id="errorMessage"></span>
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
