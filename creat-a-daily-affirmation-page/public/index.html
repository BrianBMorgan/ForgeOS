<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daily Affirmation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Daily Affirmation</h1>
        <p class="subtitle">Describe your day. Get a grounded affirmation you can actually use.</p>
      </header>

      <section class="card">
        <label for="prompt" class="label">What’s today like?</label>
        <textarea
          id="prompt"
          class="textarea"
          maxlength="500"
          placeholder="Example: I have a busy day with back-to-back meetings, but I want to stay calm and focused."
          rows="5"
        ></textarea>
        <div class="row">
          <div class="hint" id="charCount">0/500</div>
          <button id="generateBtn" class="button">Generate</button>
        </div>
        <div class="status" id="status" aria-live="polite"></div>
      </section>

      <section class="card" id="resultCard" hidden>
        <h2 class="resultTitle">Your affirmation</h2>
        <p class="affirmation" id="affirmation"></p>
        <div class="row right">
          <button id="copyBtn" class="button secondary" type="button">Copy</button>
          <button id="newBtn" class="button" type="button">New</button>
        </div>
      </section>

      <footer class="footer">
        <p>Tip: Try adding what you want to feel (calm, confident, steady) and what you’re facing (meetings, uncertainty, deadlines).</p>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
