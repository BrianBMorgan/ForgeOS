<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ForgeOS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        console.log("[forge-voice] script loaded");
        window.__forgeLastAgentMsg = "";
        window.__forgeBuildPrompt = "";
        var sendBtn = null;

        var BUILD_TRIGGERS = [
          /starting the build/i,
          /launching the build/i,
          /kicking off the build/i,
          /running the build/i,
          /initiating the build/i,
          /let me build/i,
          /i'll build/i,
          /i will build/i,
          /building it now/i,
          /starting it now/i,
          /here we go/i,
          /firing it up/i,
          /let's go/i,
          /approved.*build/i,
          /build approved/i
        ];

        function checkForBuildTrigger(text) {
          for (var i = 0; i < BUILD_TRIGGERS.length; i++) {
            if (BUILD_TRIGGERS[i].test(text)) return true;
          }
          return false;
        }

        var FILLER_PATTERNS = [
          /^are you still there\??$/i,
          /^are you there\??$/i,
          /^still with me\??$/i,
          /^you there\??$/i,
          /^hello[.!?]*$/i,
          /^hey[.!? —]*.*$/i,
          /^can you hear me\??$/i,
          /^did you hear/i,
          /^what do you think\??$/i,
          /^want me to run it\??$/i,
          /^shall i run/i,
          /^should i run/i,
          /^run it\??$/i,
          /^ready to build\??$/i,
          /^want me to build/i,
          /^sound good\??$/i,
          /^does that work\??$/i,
          /^what are you working on\??$/i,
          /^how can i help/i,
          /^forgeos assistant here/i,
          /^\[slow\]/i
        ];

        var TRAILING_FILLER = [
          /\s*run it\??\s*$/i,
          /\s*sound good\??\s*$/i,
          /\s*want me to run it\??\s*$/i,
          /\s*ready\??\s*$/i
        ];

        function isFillerMessage(text) {
          if (text.length < 25) return true;
          for (var i = 0; i < FILLER_PATTERNS.length; i++) {
            if (FILLER_PATTERNS[i].test(text)) return true;
          }
          return false;
        }

        function stripTrailingFiller(text) {
          var cleaned = text;
          for (var i = 0; i < TRAILING_FILLER.length; i++) {
            cleaned = cleaned.replace(TRAILING_FILLER[i], "");
          }
          return cleaned.trim();
        }

        function handleAgentMessage(text) {
          if (!text || text.length < 5) return;
          var msg = text.trim();
          console.log("[forge-voice] agent:", msg.slice(0, 120));
          window.__forgeLastAgentMsg = msg;

          if (checkForBuildTrigger(msg) && window.__forgeBuildPrompt) {
            console.log("[forge-voice] BUILD TRIGGER detected, submitting:", window.__forgeBuildPrompt.slice(0, 80));
            if (window.__forgeRunBuild) {
              window.__forgeRunBuild(window.__forgeBuildPrompt);
              window.__forgeBuildPrompt = "";
              window.__forgeLastAgentMsg = "";
              if (sendBtn) sendBtn.style.display = "none";
            } else if (window.__forgeSetPrompt) {
              window.__forgeSetPrompt(window.__forgeBuildPrompt);
              window.__forgeBuildPrompt = "";
              window.__forgeLastAgentMsg = "";
              if (sendBtn) sendBtn.style.display = "none";
            }
          } else if (!checkForBuildTrigger(msg) && !isFillerMessage(msg)) {
            var cleaned = stripTrailingFiller(msg);
            if (cleaned.length > 20) {
              console.log("[forge-voice] stored as build prompt:", cleaned.slice(0, 80));
              window.__forgeBuildPrompt = cleaned;
              showSendButton();
            } else {
              console.log("[forge-voice] ignored (too short after cleanup)");
            }
          } else {
            console.log("[forge-voice] ignored (filler or trigger without prompt)");
          }
        }

        document.addEventListener("elevenlabs-convai:call", function(e) {
          console.log("[forge-voice] call event intercepted");
          if (e.detail && e.detail.config) {
            var origOnMessage = e.detail.config.onMessage;
            e.detail.config.onMessage = function(data) {
              if (origOnMessage) origOnMessage(data);
              if (data && data.source === "ai" && data.message) {
                handleAgentMessage(data.message);
              }
            };

            var origOnDisconnect = e.detail.config.onDisconnect;
            e.detail.config.onDisconnect = function() {
              if (origOnDisconnect) origOnDisconnect();
              console.log("[forge-voice] call ended");
              if (window.__forgeBuildPrompt && window.__forgeSetPrompt) {
                setTimeout(function() {
                  window.__forgeSetPrompt(window.__forgeBuildPrompt);
                  window.__forgeBuildPrompt = "";
                  window.__forgeLastAgentMsg = "";
                  if (sendBtn) sendBtn.style.display = "none";
                }, 300);
              } else if (window.__forgeLastAgentMsg && window.__forgeSetPrompt) {
                setTimeout(function() {
                  window.__forgeSetPrompt(window.__forgeLastAgentMsg);
                  window.__forgeLastAgentMsg = "";
                  if (sendBtn) sendBtn.style.display = "none";
                }, 300);
              }
            };
          }
        });

        function createSendButton() {
          sendBtn = document.createElement("button");
          sendBtn.id = "forge-voice-send";
          sendBtn.textContent = "Send to Prompt";
          sendBtn.style.cssText = "display:none;position:fixed;bottom:64px;right:16px;z-index:10000;background:#e8630a;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:system-ui;box-shadow:0 2px 8px rgba(232,99,10,0.4);transition:opacity 0.2s;white-space:nowrap;";
          sendBtn.addEventListener("mouseenter", function() { sendBtn.style.opacity = "0.85"; });
          sendBtn.addEventListener("mouseleave", function() { sendBtn.style.opacity = "1"; });
          sendBtn.addEventListener("click", function() {
            if (window.__forgeBuildPrompt && window.__forgeSetPrompt) {
              window.__forgeSetPrompt(window.__forgeBuildPrompt);
              window.__forgeBuildPrompt = "";
              window.__forgeLastAgentMsg = "";
              sendBtn.style.display = "none";
            } else if (window.__forgeLastAgentMsg && window.__forgeSetPrompt) {
              window.__forgeSetPrompt(window.__forgeLastAgentMsg);
              window.__forgeLastAgentMsg = "";
              sendBtn.style.display = "none";
            }
          });
          document.body.appendChild(sendBtn);
        }

        function showSendButton() {
          if (!sendBtn) createSendButton();
          if (sendBtn && (window.__forgeBuildPrompt || window.__forgeLastAgentMsg)) {
            sendBtn.style.display = "block";
          }
        }

        document.addEventListener("keydown", function(e) {
          if (e.altKey && e.key === "p") {
            var text = window.__forgeBuildPrompt || window.__forgeLastAgentMsg;
            if (text && window.__forgeSetPrompt) {
              window.__forgeSetPrompt(text);
              window.__forgeBuildPrompt = "";
              window.__forgeLastAgentMsg = "";
              if (sendBtn) sendBtn.style.display = "none";
            }
          }
        });
      })();
    </script>
    <elevenlabs-convai agent-id="agent_0101kjmpctmffrvsbqen3ny1b5cc"></elevenlabs-convai>
    <script src="https://elevenlabs.io/convai-widget/index.js" async></script>
    <style>
      elevenlabs-convai {
        position: fixed !important;
        bottom: 8px !important;
        right: 16px !important;
        left: auto !important;
        transform: none !important;
        z-index: 9999 !important;
      }
    </style>
  </body>
</html>
