<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand Scraper — Extract Brand Identity</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e2230;
      --border: #2a2f3e;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --text: #e8eaf0;
      --text-muted: #7a8099;
      --error: #ff5c5c;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 0 16px 60px;
    }

    header {
      text-align: center;
      padding: 52px 0 36px;
    }

    header h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      background: linear-gradient(135deg, #6c63ff, #00d4aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    header p {
      color: var(--text-muted);
      margin-top: 10px;
      font-size: 1rem;
    }

    .input-section {
      max-width: 680px;
      margin: 0 auto 40px;
    }

    .url-form {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px;
      transition: border-color 0.2s;
    }

    .url-form:focus-within {
      border-color: var(--accent);
    }

    .url-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1rem;
      padding: 8px 12px;
    }

    .url-input::placeholder { color: var(--text-muted); }

    .scan-btn {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 10px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .scan-btn:hover { opacity: 0.9; }
    .scan-btn:active { transform: scale(0.97); }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-box {
      background: rgba(255,92,92,0.1);
      border: 1px solid rgba(255,92,92,0.3);
      color: var(--error);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-top: 12px;
      font-size: 0.9rem;
    }

    .loader {
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .results {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .copy-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .copy-btn.copied {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .card-body { padding: 20px; }

    /* Brand Overview */
    .brand-name {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .brand-url {
      color: var(--accent);
      font-size: 0.85rem;
      text-decoration: none;
      margin-bottom: 12px;
      display: inline-block;
    }

    .brand-summary {
      color: var(--text-muted);
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .keyword-tag {
      background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.3);
      color: #a89fff;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    /* Colors */
    .color-groups { display: grid; gap: 16px; }

    .color-group-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .color-swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .swatch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .swatch-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.1);
      transition: transform 0.15s;
    }

    .swatch:hover .swatch-circle { transform: scale(1.1); }

    .swatch-hex {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: monospace;
    }

    .color-notes {
      margin-top: 12px;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Typography */
    .font-display {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .font-meta {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .font-meta-item {
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px;
    }

    .font-meta-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .font-meta-value {
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* Tone */
    .tone-primary {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent2);
      margin-bottom: 10px;
    }

    .tone-descriptors {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tone-tag {
      background: rgba(0,212,170,0.1);
      border: 1px solid rgba(0,212,170,0.25);
      color: var(--accent2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
    }

    .tone-detail {
      margin-bottom: 10px;
    }

    .tone-detail-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 3px;
    }

    .tone-detail-value {
      font-size: 0.9rem;
      line-height: 1.5;
    }

    /* Visual Style */
    .visual-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .visual-item {
      background: var(--surface2);
      border-radius: 8px;
      padding: 14px;
    }

    .visual-item-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    .visual-item-value {
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.4;
    }

    /* CSS Patterns */
    .code-block {
      background: #0a0c10;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-family: 'Courier New', 'Fira Code', monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      color: #a8d8a8;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 14px;
      overflow-x: auto;
    }

    .code-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    /* Full report */
    .full-report-area {
      background: #0a0c10;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 400px;
      overflow-y: auto;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <h1>Brand Scraper</h1>
  <p>Enter any URL to extract fonts, colors, tone, and CSS patterns</p>
</header>

<div class="input-section">
  <div class="url-form">
    <input
      type="text"
      class="url-input"
      id="urlInput"
      placeholder="https://stripe.com"
      autocomplete="off"
      spellcheck="false"
    />
    <button class="scan-btn" id="scanBtn" onclick="runScrape()">Scan Brand</button>
  </div>
  <div class="error-box hidden" id="errorBox"></div>
</div>

<div class="loader hidden" id="loader">
  <div class="spinner"></div>
  <p>Analyzing brand identity...</p>
</div>

<div class="results hidden" id="results"></div>

<script>
  function hideError() {
    document.getElementById('errorBox').classList.add('hidden');
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.classList.remove('hidden');
  }

  function setLoading(on) {
    document.getElementById('loader').classList.toggle('hidden', !on);
    document.getElementById('scanBtn').disabled = on;
    document.getElementById('scanBtn').textContent = on ? 'Scanning...' : 'Scan Brand';
  }

  async function copyText(text, btn) {
    try {
      await navigator.clipboard.writeText(text);
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
    } catch {
      btn.textContent = 'Failed';
      setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
    }
  }

  function makeCopyBtn(label, getText) {
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = label || 'Copy';
    btn.onclick = () => copyText(typeof getText === 'function' ? getText() : getText, btn);
    return btn;
  }

  function colorSection(colors) {
    const groups = [
      { key: 'primary', label: 'Primary' },
      { key: 'secondary', label: 'Secondary' },
      { key: 'accent', label: 'Accent' },
      { key: 'background', label: 'Background' },
      { key: 'text', label: 'Text' }
    ];

    let allHex = [];
    const groupsHtml = groups.map(g => {
      const vals = colors[g.key];
      if (!vals || !vals.length) return '';
      allHex = allHex.concat(vals);
      const swatches = vals.map(hex => {
        return '<div class="swatch" onclick="copySwatchHex(this, \'' + hex + '\')" title="Click to copy ' + hex + '"><div class="swatch-circle" style="background:' + hex + '"></div><span class="swatch-hex">' + hex + '</span></div>';
      }).join('');
      return '<div><div class="color-group-label">' + g.label + '</div><div class="color-swatches">' + swatches + '</div></div>';
    }).join('');

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = '0.1s';

    const header = document.createElement('div');
    header.className = 'card-header';
    const title = document.createElement('span');
    title.className = 'card-title';
    title.textContent = 'Color Palette';
    header.appendChild(title);
    const copyBtn = makeCopyBtn('Copy All Hex', () => allHex.join(', '));
    header.appendChild(copyBtn);
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = 'card-body';
    const groupsDiv = document.createElement('div');
    groupsDiv.className = 'color-groups';
    groupsDiv.innerHTML = groupsHtml;
    body.appendChild(groupsDiv);
    if (colors.notes) {
      const notes = document.createElement('div');
      notes.className = 'color-notes';
      notes.textContent = colors.notes;
      body.appendChild(notes);
    }
    card.appendChild(body);
    return card;
  }

  window.copySwatchHex = async function(el, hex) {
    try {
      await navigator.clipboard.writeText(hex);
      const orig = el.querySelector('.swatch-hex').textContent;
      el.querySelector('.swatch-hex').textContent = 'Copied!';
      setTimeout(() => { el.querySelector('.swatch-hex').textContent = orig; }, 1200);
    } catch {}
  };

  function typographySection(typo) {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = '0.15s';

    const header = document.createElement('div');
    header.className = 'card-header';
    const title = document.createElement('span');
    title.className = 'card-title';
    title.textContent = 'Typography';
    header.appendChild(title);
    const copyBtn = makeCopyBtn('Copy CSS', () => {
      return '/* Typography */\n' + (typo.css_snippet || '') + '\n/* Weights: ' + (typo.font_weights || []).join(', ') + ' */';
    });
    header.appendChild(copyBtn);
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = 'card-body';

    const display = document.createElement('div');
    display.className = 'font-display';
    display.textContent = typo.primary_font || 'Unknown Font';
    if (typo.primary_font) display.style.fontFamily = typo.primary_font + ', sans-serif';
    body.appendChild(display);

    const meta = document.createElement('div');
    meta.className = 'font-meta';
    const items = [
      { label: 'Primary Font', value: typo.primary_font },
      { label: 'Secondary Font', value: typo.secondary_font || '—' },
      { label: 'Weights', value: (typo.font_weights || []).join(', ') || '—' },
      { label: 'Size Scale', value: typo.font_sizes || '—' }
    ];
    items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'font-meta-item';
      div.innerHTML = '<div class="font-meta-label">' + item.label + '</div><div class="font-meta-value">' + (item.value || '—') + '</div>';
      meta.appendChild(div);
    });
    body.appendChild(meta);

    if (typo.css_snippet) {
      const codeLabel = document.createElement('div');
      codeLabel.className = 'code-label';
      codeLabel.style.marginTop = '16px';
      codeLabel.textContent = 'CSS Snippet';
      body.appendChild(codeLabel);
      const code = document.createElement('div');
      code.className = 'code-block';
      code.textContent = typo.css_snippet;
      body.appendChild(code);
    }

    card.appendChild(body);
    return card;
  }

  function toneSection(tone) {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = '0.2s';

    const header = document.createElement('div');
    header.className = 'card-header';
    const title = document.createElement('span');
    title.className = 'card-title';
    title.textContent = 'Tone & Voice';
    header.appendChild(title);
    const copyBtn = makeCopyBtn('Copy', () => {
      return 'Tone: ' + (tone.primary_tone || '') + '\nDescriptors: ' + (tone.descriptors || []).join(', ') + '\nWriting Style: ' + (tone.writing_style || '') + '\nCTA Style: ' + (tone.cta_style || '');
    });
    header.appendChild(copyBtn);
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = 'card-body';

    const primary = document.createElement('div');
    primary.className = 'tone-primary';
    primary.textContent = tone.primary_tone || '';
    body.appendChild(primary);

    if (tone.descriptors && tone.descriptors.length) {
      const tags = document.createElement('div');
      tags.className = 'tone-descriptors';
      tone.descriptors.forEach(d => {
        const tag = document.createElement('span');
        tag.className = 'tone-tag';
        tag.textContent = d;
        tags.appendChild(tag);
      });
      body.appendChild(tags);
    }

    [{ label: 'Writing Style', key: 'writing_style' }, { label: 'CTA Style', key: 'cta_style' }].forEach(item => {
      if (tone[item.key]) {
        const div = document.createElement('div');
        div.className = 'tone-detail';
        div.innerHTML = '<div class="tone-detail-label">' + item.label + '</div><div class="tone-detail-value">' + tone[item.key] + '</div>';
        body.appendChild(div);
      }
    });

    card.appendChild(body);
    return card;
  }

  function visualSection(visual) {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = '0.25s';

    const header = document.createElement('div');
    header.className = 'card-header';
    const title = document.createElement('span');
    title.className = 'card-title';
    title.textContent = 'Visual Style';
    header.appendChild(title);
    const copyBtn = makeCopyBtn('Copy', () => {
      return Object.entries(visual).map(([k, v]) => k.replace(/_/g, ' ') + ': ' + v).join('\n');
    });
    header.appendChild(copyBtn);
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = 'card-body';
    const grid = document.createElement('div');
    grid.className = 'visual-grid';

    const items = [
      { label: 'Design Aesthetic', key: 'design_aesthetic' },
      { label: 'Border Radius', key: 'border_radius' },
      { label: 'Spacing Style', key: 'spacing_style' },
      { label: 'Shadow Usage', key: 'shadow_usage' },
      { label: 'Imagery Style', key: 'imagery_style' }
    ];

    items.forEach(item => {
      if (visual[item.key]) {
        const div = document.createElement('div');
        div.className = 'visual-item';
        div.innerHTML = '<div class="visual-item-label">' + item.label + '</div><div class="visual-item-value">' + visual[item.key] + '</div>';
        grid.appendChild(div);
      }
    });

    body.appendChild(grid);
    card.appendChild(body);
    return card;
  }

  function cssSection(patterns) {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = '0.3s';

    const header = document.createElement('div');
    header.className = 'card-header';
    const title = document.createElement('span');
    title.className = 'card-title';
    title.textContent = 'CSS Patterns';
    header.appendChild(title);
    const allCss = [patterns.css_variables, patterns.button_style, patterns.card_style].filter(Boolean).join('\n\n');
    const copyBtn = makeCopyBtn('Copy All CSS', () => allCss);
    header.appendChild(copyBtn);
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = 'card-body';

    const blocks = [
      { label: 'CSS Variables', key: 'css_variables' },
      { label: 'Button Style', key: 'button_style' },
      { label: 'Card Style', key: 'card_style' }
    ];

    blocks.forEach(b => {
      if (patterns[b.key]) {
        const label = document.createElement('div');
        label.className = 'code-label';
        label.textContent = b.label;
        body.appendChild(label);

        const wrapper = document.createElement('div');
        wrapper.style.position = 'relative';
        wrapper.style.marginBottom = '14px';

        const code = document.createElement('div');
        code.className = 'code-block';
        code.style.marginBottom = '0';
        code.textContent = patterns[b.key];
        wrapper.appendChild(code);

        const copySnippet = makeCopyBtn('Copy', () => patterns[b.key]);
        copySnippet.style.position = 'absolute';
        copySnippet.style.top = '8px';
        copySnippet.style.right = '8px';
        wrapper.appendChild(copySnippet);

        body.appendChild(wrapper);
      }
    });

    card.appendChild(body);
    return card;
  }

  function fullReportSection(data) {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = '0.35s';

    const header = document.createElement('div');
    header.className = 'card-header';
    const title = document.createElement('span');
    title.className = 'card-title';
    title.textContent = 'Full Report (JSON)';
    header.appendChild(title);
    const reportText = JSON.stringify(data, null, 2);
    const copyBtn = makeCopyBtn('Copy JSON', () => reportText);
    header.appendChild(copyBtn);
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = 'card-body';
    const pre = document.createElement('div');
    pre.className = 'full-report-area';
    pre.textContent = reportText;
    body.appendChild(pre);
    card.appendChild(body);
    return card;
  }

  function renderResults(data) {
    const container = document.getElementById('results');
    container.innerHTML = '';

    // Overview card
    const overview = document.createElement('div');
    overview.className = 'card';
    const ovHeader = document.createElement('div');
    ovHeader.className = 'card-header';
    const ovTitle = document.createElement('span');
    ovTitle.className = 'card-title';
    ovTitle.textContent = 'Brand Overview';
    ovHeader.appendChild(ovTitle);
    const ovCopy = makeCopyBtn('Copy Summary', () => {
      return (data.brand_name || '') + '\n' + (data.website || '') + '\n\n' + (data.summary || '') + '\n\nKeywords: ' + (data.brand_keywords || []).join(', ');
    });
    ovHeader.appendChild(ovCopy);
    overview.appendChild(ovHeader);

    const ovBody = document.createElement('div');
    ovBody.className = 'card-body';
    const nameEl = document.createElement('div');
    nameEl.className = 'brand-name';
    nameEl.textContent = data.brand_name || 'Unknown Brand';
    ovBody.appendChild(nameEl);

    if (data.website) {
      const urlEl = document.createElement('a');
      urlEl.className = 'brand-url';
      urlEl.href = data.website;
      urlEl.target = '_blank';
      urlEl.rel = 'noopener noreferrer';
      urlEl.textContent = data.website;
      ovBody.appendChild(urlEl);
    }

    if (data.summary) {
      const sumEl = document.createElement('p');
      sumEl.className = 'brand-summary';
      sumEl.textContent = data.summary;
      ovBody.appendChild(sumEl);
    }

    if (data.brand_keywords && data.brand_keywords.length) {
      const kw = document.createElement('div');
      kw.className = 'keywords';
      data.brand_keywords.forEach(k => {
        const tag = document.createElement('span');
        tag.className = 'keyword-tag';
        tag.textContent = k;
        kw.appendChild(tag);
      });
      ovBody.appendChild(kw);
    }

    overview.appendChild(ovBody);
    container.appendChild(overview);

    if (data.colors) container.appendChild(colorSection(data.colors));
    if (data.typography) container.appendChild(typographySection(data.typography));
    if (data.tone_and_voice) container.appendChild(toneSection(data.tone_and_voice));
    if (data.visual_style) container.appendChild(visualSection(data.visual_style));
    if (data.css_patterns) container.appendChild(cssSection(data.css_patterns));
    container.appendChild(fullReportSection(data));

    container.classList.remove('hidden');
  }

  async function runScrape() {
    hideError();
    const url = document.getElementById('urlInput').value.trim();
    if (!url) {
      showError('Please enter a URL to scan.');
      return;
    }

    document.getElementById('results').classList.add('hidden');
    setLoading(true);

    try {
      const res = await fetch('/api/scrape', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      const json = await res.json();

      if (!res.ok || !json.success) {
        showError(json.error || 'Something went wrong. Please try again.');
        return;
      }

      renderResults(json.data);
    } catch (err) {
      showError('Network error. Please check your connection and try again.');
    } finally {
      setLoading(false);
    }
  }

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') runScrape();
  });
</script>

</body>
</html>
